<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
            text-align:center;
            margin-top:50px;
        }

        .chat-box{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
        }

        .reply{
            margin-top:20px;
            padding:10px;
            background:#e8f0fe;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="chat-box">
    <h1>AI Chatbot</h1>

    <form method="GET">
        <input type="text" name="message" placeholder="Enter message">
        <button type="submit">Send</button>
    </form>

    <div class="reply">
        <h3>Bot Reply</h3>
        <p>{{ reply }}</p>
    </div>
</div>

</body>
</html>
